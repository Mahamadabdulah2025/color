<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compact Color Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            transition: background-color 0.2s ease-out;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 10px;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden; /* Prevents scrolling */
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }
        /* Navigation buttons are now completely identical and static */
        .nav-btn {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2); /* Fixed neutral background */
            backdrop-filter: blur(4px);
            color: #ffffff; /* Fixed white icon color */
            transition: background 0.2s ease;
            cursor: pointer;
            border: none;
            outline: none;
            z-index: 20;
        }
        .nav-btn:hover {
            background: rgba(0, 0, 0, 0.4);
        }
        .nav-btn.left { left: 0; border-right: 1px solid rgba(255,255,255,0.1); }
        .nav-btn.right { right: 0; border-left: 1px solid rgba(255,255,255,0.1); }
        
        .search-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 0.5rem;
            width: 100%;
            text-align: center;
            margin-bottom: 1rem;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .search-input:focus {
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <!-- Identical Navigation Buttons -->
    <button onclick="changeColor(-1)" class="nav-btn left" aria-label="Previous">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <button onclick="changeColor(1)" class="nav-btn right" aria-label="Next">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>

    <div class="glass-container">
        <!-- Search at Top -->
        <input type="text" id="search-box" class="search-input" placeholder="Search name, Hex or RGB..." oninput="handleSearch()">

        <!-- Color Name or Hex Primary -->
        <div id="color-display" class="text-5xl font-black tracking-tighter uppercase leading-tight mb-1">
            #000000
        </div>
        
        <!-- Secondary Info (Hex if Name is showing) -->
        <div id="secondary-display" class="text-xs font-mono opacity-60 mb-2">
            HEX: #000000
        </div>

        <!-- RGB always at bottom -->
        <div id="rgb-value" class="text-sm font-mono opacity-70 tracking-widest">
            rgb(0, 0, 0)
        </div>
    </div>

    <script>
        const TOTAL_COLORS = 16777216;
        let currentIndex = 0;

        // Standard CSS Color Names Mapping
        const colorNames = {
            "#F0F8FF": "AliceBlue", "#FAEBD7": "AntiqueWhite", "#00FFFF": "Aqua", "#7FFFD4": "Aquamarine", "#F0FFFF": "Azure",
            "#F5F5DC": "Beige", "#FFE4C4": "Bisque", "#000000": "Black", "#FFEBCD": "BlanchedAlmond", "#0000FF": "Blue",
            "#8A2BE2": "BlueViolet", "#A52A2A": "Brown", "#DEB887": "BurlyWood", "#5F9EA0": "CadetBlue", "#7FFF00": "Chartreuse",
            "#D2691E": "Chocolate", "#FF7F50": "Coral", "#6495ED": "CornflowerBlue", "#FFF8DC": "Cornsilk", "#DC143C": "Crimson",
            "#00008B": "DarkBlue", "#008B8B": "DarkCyan", "#B8860B": "DarkGoldenRod", "#A9A9A9": "DarkGray", "#006400": "DarkGreen",
            "#BDB76B": "DarkKhaki", "#8B008B": "DarkMagenta", "#556B2F": "DarkOliveGreen", "#FF8C00": "DarkOrange", "#9932CC": "DarkOrchid",
            "#8B0000": "DarkRed", "#E9967A": "DarkSalmon", "#8FBC8F": "DarkSeaGreen", "#483D8B": "DarkSlateBlue", "#2F4F4F": "DarkSlateGray",
            "#00CED1": "DarkTurquoise", "#9400D3": "DarkViolet", "#FF1493": "DeepPink", "#00BFFF": "DeepSkyBlue", "#696969": "DimGray",
            "#1E90FF": "DodgerBlue", "#B22222": "FireBrick", "#FFFAF0": "FloralWhite", "#228B22": "ForestGreen", "#FF00FF": "Fuchsia",
            "#DCDCDC": "Gainsboro", "#F8F8FF": "GhostWhite", "#FFD700": "Gold", "#DAA520": "GoldenRod", "#808080": "Gray",
            "#008000": "Green", "#ADFF2F": "GreenYellow", "#F0FFF0": "HoneyDew", "#FF69B4": "HotPink", "#CD5C5C": "IndianRed",
            "#4B0082": "Indigo", "#FFFFF0": "Ivory", "#F0E68C": "Khaki", "#E6E6FA": "Lavender", "#FFF0F5": "LavenderBlush",
            "#7CFC00": "LawnGreen", "#FFFACD": "LemonChiffon", "#ADD8E6": "LightBlue", "#F08080": "LightCoral", "#E0FFFF": "LightCyan",
            "#FAFAD2": "LightGoldenRodYellow", "#D3D3D3": "LightGray", "#90EE90": "LightGreen", "#FFB6C1": "LightPink", "#FFA07A": "LightSalmon",
            "#20B2AA": "LightSeaGreen", "#87CEFA": "LightSkyBlue", "#778899": "LightSlateGray", "#B0C4DE": "LightSteelBlue", "#FFFFE0": "LightYellow",
            "#00FF00": "Lime", "#32CD32": "LimeGreen", "#FAF0E6": "Linen", "#800000": "Maroon", "#66CDAA": "MediumAquaMarine",
            "#0000CD": "MediumBlue", "#BA55D3": "MediumOrchid", "#9370DB": "MediumPurple", "#3CB371": "MediumSeaGreen", "#7B68EE": "MediumSlateBlue",
            "#00FA9A": "MediumSpringGreen", "#48D1CC": "MediumTurquoise", "#C71585": "MediumVioletRed", "#191970": "MidnightBlue", "#F5FFFA": "MintCream",
            "#FFE4E1": "MistyRose", "#FFE4B5": "Moccasin", "#FFDEAD": "NavajoWhite", "#000080": "Navy", "#FDF5E6": "OldLace",
            "#808000": "Olive", "#6B8E23": "OliveDrab", "#FFA500": "Orange", "#FF4500": "OrangeRed", "#DA70D6": "Orchid",
            "#EEE8AA": "PaleGoldenRod", "#98FB98": "PaleGreen", "#AFEEEE": "PaleTurquoise", "#DB7093": "PaleVioletRed", "#FFEFD5": "PapayaWhip",
            "#FFDAB9": "PeachPuff", "#CD853F": "Peru", "#FFC0CB": "Pink", "#DDA0DD": "Plum", "#B0E0E6": "PowderBlue",
            "#800080": "Purple", "#663399": "RebeccaPurple", "#FF0000": "Red", "#BC8F8F": "RosyBrown", "#4169E1": "RoyalBlue",
            "#8B4513": "SaddleBrown", "#FA8072": "Salmon", "#F4A460": "SandyBrown", "#2E8B57": "SeaGreen", "#FFF5EE": "SeaShell",
            "#A0522D": "Sienna", "#C0C0C0": "Silver", "#87CEEB": "SkyBlue", "#6A5ACD": "SlateBlue", "#708090": "SlateGray",
            "#FFFAFA": "Snow", "#00FF7F": "SpringGreen", "#4682B4": "SteelBlue", "#D2B48C": "Tan", "#008080": "Teal",
            "#D8BFD8": "Thistle", "#FF6347": "Tomato", "#40E0D0": "Turquoise", "#EE82EE": "Violet", "#F5DEB3": "Wheat",
            "#FFFFFF": "White", "#F5F5F5": "WhiteSmoke", "#FFFF00": "Yellow", "#9ACD32": "YellowGreen"
        };

        const tempDiv = document.createElement('div');
        tempDiv.style.display = 'none';
        document.body.appendChild(tempDiv);

        function nameToHex(name) {
            tempDiv.style.color = name;
            const computed = window.getComputedStyle(tempDiv).color;
            if (!computed || computed === 'rgba(0, 0, 0, 0)') return null;
            if (name.toLowerCase() !== 'black' && computed === 'rgb(0, 0, 0)') return null;
            const rgb = computed.match(/\d+/g).map(Number);
            return (rgb[0] << 16) | (rgb[1] << 8) | rgb[2];
        }

        function handleSearch() {
            const query = document.getElementById('search-box').value.trim().toLowerCase();
            if (!query) return;

            let newIndex = -1;
            if (query.startsWith('#')) {
                const hexPart = query.slice(1);
                if (hexPart.length === 3) {
                    const fullHex = hexPart[0] + hexPart[0] + hexPart[1] + hexPart[1] + hexPart[2] + hexPart[2];
                    newIndex = parseInt(fullHex, 16);
                } else if (hexPart.length === 6) {
                    newIndex = parseInt(hexPart, 16);
                }
            } else if (query.includes(',') || query.startsWith('rgb')) {
                const parts = query.replace(/[rgb\(\)]/g, '').split(',').map(p => parseInt(p.trim()));
                if (parts.length === 3 && parts.every(p => !isNaN(p) && p >= 0 && p <= 255)) {
                    newIndex = (parts[0] << 16) | (parts[1] << 8) | parts[2];
                }
            } else {
                const namedIdx = nameToHex(query);
                if (namedIdx !== null) newIndex = namedIdx;
                else {
                    const rawHex = parseInt(query, 16);
                    if (!isNaN(rawHex) && query.length === 6) newIndex = rawHex;
                }
            }

            if (newIndex >= 0 && newIndex < TOTAL_COLORS) {
                currentIndex = newIndex;
                updateDisplay(false); 
            }
        }

        function updateDisplay(clearSearch = true) {
            const r = (currentIndex >> 16) & 255;
            const g = (currentIndex >> 8) & 255;
            const b = currentIndex & 255;

            const hex = "#" + currentIndex.toString(16).padStart(6, '0').toUpperCase();
            const rgbStr = `rgb(${r}, ${g}, ${b})`;
            
            // UI elements
            const displayEl = document.getElementById('color-display');
            const secondaryEl = document.getElementById('secondary-display');
            const rgbEl = document.getElementById('rgb-value');
            const card = document.querySelector('.glass-container');
            const input = document.getElementById('search-box');

            // Apply background
            document.body.style.backgroundColor = hex;

            // Handle Name vs Hex display
            const colorName = colorNames[hex];
            if (colorName) {
                displayEl.textContent = colorName;
                secondaryEl.textContent = `HEX: ${hex}`;
                secondaryEl.style.display = 'block';
            } else {
                displayEl.textContent = hex;
                secondaryEl.style.display = 'none';
            }

            rgbEl.textContent = rgbStr;
            if (clearSearch) input.value = '';

            // Dynamic Contrast for central content
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            const isLight = brightness > 155;
            const textColor = isLight ? '#000000' : '#ffffff';
            
            card.style.color = textColor;
            card.style.borderColor = isLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.2)';
            input.style.color = textColor;
            input.style.borderColor = isLight ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.3)';
        }

        function changeColor(direction) {
            currentIndex += direction;
            if (currentIndex >= TOTAL_COLORS) currentIndex = 0;
            if (currentIndex < 0) currentIndex = TOTAL_COLORS - 1;
            updateDisplay();
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (document.activeElement.id === 'search-box') return;
            if (e.key === "ArrowRight") changeColor(1);
            if (e.key === "ArrowLeft") changeColor(-1);
        });

        window.onload = updateDisplay;
    </script>
</body>
</html>
